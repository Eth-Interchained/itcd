workflows:

  # ── macOS Apple Silicon (arm64) ─────────────────────────────────────────
  macos-arm64:
    name: macOS arm64 — interchainedd + nedb-ffi
    instance_type: mac_mini_m2
    max_build_duration: 90

    triggering:
      events:
        - tag
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true

    environment:
      vars:
        ARTIFACT_DIR: out

    scripts:
      - name: Install build deps
        script: |
          brew update
          brew install autoconf automake libtool pkg-config \
            boost libevent miniupnpc zeromq sqlite rustup-init || true
          rustup-init -y --profile minimal
          source "$HOME/.cargo/env"
          rustup default stable

      - name: Build NEDB FFI (arm64, lto=false for ELF extraction)
        script: |
          source "$HOME/.cargo/env"
          sed -i '' 's/^lto[[:space:]]*=.*/lto = false/' nedb-ffi/Cargo.toml
          cd nedb-ffi
          RUSTFLAGS="-C embed-bitcode=no" cargo rustc --release --crate-type=staticlib
          echo "libnedb_ffi.a (arm64): $(du -sh target/release/libnedb_ffi.a | cut -f1)"
          SYMS=$(nm target/release/libnedb_ffi.a 2>/dev/null | grep -c ' T _nedb_' || echo 0)
          echo "nedb_* T-symbols: $SYMS"
          [ "$SYMS" -gt 0 ] || { echo "ERROR: no nedb_* symbols"; exit 1; }

      - name: Build Berkeley DB 4.8
        script: |
          J=$(sysctl -n hw.logicalcpu || echo 4)
          git clone --depth=1 https://github.com/observerdev/db-4.8.30.git bdb-src
          sed -i '' 's/__atomic_compare_exchange/__db_atomic_compare_exchange/g' bdb-src/dbinc/atomic.h
          cd bdb-src/build_unix
          CFLAGS="-O2 -fPIC" ../dist/configure \
            --prefix="$CM_BUILD_DIR/db4" --enable-cxx --disable-shared --with-pic
          make -j"$J" && make install
          cd "$CM_BUILD_DIR/db4/lib"
          [ -f libdb_cxx.a ] && ln -sf libdb_cxx.a libdb_cxx-4.8.a || true
          [ -f libdb.a ]     && ln -sf libdb.a     libdb-4.8.a     || true

      - name: Configure & Build interchainedd (arm64)
        script: |
          source "$HOME/.cargo/env"
          J=$(sysctl -n hw.logicalcpu || echo 4)
          ./autogen.sh
          export CPATH="$CM_BUILD_DIR/db4/include:${CPATH:-}"
          export CPPFLAGS="-I$CM_BUILD_DIR/db4/include"
          export LDFLAGS="-L$CM_BUILD_DIR/db4/lib"
          export CFLAGS="-O2"
          export CXXFLAGS="-O2 -std=c++14"
          export BDB_LIBS="$CM_BUILD_DIR/db4/lib/libdb_cxx-4.8.a $CM_BUILD_DIR/db4/lib/libdb-4.8.a -pthread"

          ./configure \
            --enable-wallet --with-incompatible-bdb --without-gui \
            --disable-bench --disable-tests --with-zmq --with-miniupnpc \
            || { cat config.log; exit 1; }

          NEDB_LIB="$(pwd)/nedb-ffi/target/release/libnedb_ffi.a"
          echo "LIBS += -Wl,-force_load,${NEDB_LIB} -lpthread" >> src/Makefile

          make -j"$J"
          test -f src/interchainedd && test -f src/interchained-cli
          file src/interchainedd

      - name: Package
        script: |
          mkdir -p "$ARTIFACT_DIR"
          cp src/interchainedd src/interchained-cli "$ARTIFACT_DIR"/
          strip "$ARTIFACT_DIR/interchainedd" || true
          strip "$ARTIFACT_DIR/interchained-cli" || true
          [ -f README.md ] && cp README.md "$ARTIFACT_DIR"/ || true
          shasum -a 256 "$ARTIFACT_DIR"/* > "$ARTIFACT_DIR/SHA256SUMS"
          PKG="interchained-macos-arm64-${CM_TAG:-${CM_COMMIT:0:8}}.tar.gz"
          tar -C "$ARTIFACT_DIR" -czf "$PKG" .
          echo "PKG=$PKG" >> "$CM_ENV"
          echo "Binary: $(du -sh $ARTIFACT_DIR/interchainedd)"

    artifacts:
      - interchained-macos-arm64-*.tar.gz
      - nedb-ffi/target/release/libnedb_ffi.a

  # ── macOS Intel (x86_64) ────────────────────────────────────────────────
  macos-x86_64:
    name: macOS x86_64 Intel — interchainedd + nedb-ffi (for iMac)
    instance_type: mac_mini_m2   # build for Intel via cross-compile target
    max_build_duration: 90

    triggering:
      events:
        - tag
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      tag_patterns:
        - pattern: 'v*'
          include: true

    environment:
      vars:
        ARTIFACT_DIR: out

    scripts:
      - name: Install build deps + Rust x86_64 target
        script: |
          brew update
          brew install autoconf automake libtool pkg-config \
            boost libevent miniupnpc zeromq sqlite rustup-init || true
          rustup-init -y --profile minimal
          source "$HOME/.cargo/env"
          rustup default stable
          rustup target add x86_64-apple-darwin

      - name: Build NEDB FFI (x86_64 cross-compile)
        script: |
          source "$HOME/.cargo/env"
          sed -i '' 's/^lto[[:space:]]*=.*/lto = false/' nedb-ffi/Cargo.toml
          cd nedb-ffi
          RUSTFLAGS="-C embed-bitcode=no" \
            cargo rustc --release --crate-type=staticlib \
            --target x86_64-apple-darwin
          echo "libnedb_ffi.a (x86_64): $(du -sh target/x86_64-apple-darwin/release/libnedb_ffi.a | cut -f1)"
          SYMS=$(nm target/x86_64-apple-darwin/release/libnedb_ffi.a 2>/dev/null | grep -c ' T _nedb_' || echo 0)
          echo "nedb_* T-symbols: $SYMS"
          [ "$SYMS" -gt 0 ] || { echo "ERROR: no nedb_* symbols"; exit 1; }

      - name: Build Berkeley DB 4.8 (for x86_64)
        script: |
          J=$(sysctl -n hw.logicalcpu || echo 4)
          git clone --depth=1 https://github.com/observerdev/db-4.8.30.git bdb-src
          sed -i '' 's/__atomic_compare_exchange/__db_atomic_compare_exchange/g' bdb-src/dbinc/atomic.h
          cd bdb-src/build_unix
          CFLAGS="-O2 -fPIC -arch x86_64" \
          ../dist/configure \
            --prefix="$CM_BUILD_DIR/db4" \
            --enable-cxx --disable-shared --with-pic \
            --host=x86_64-apple-darwin
          make -j"$J" && make install
          cd "$CM_BUILD_DIR/db4/lib"
          [ -f libdb_cxx.a ] && ln -sf libdb_cxx.a libdb_cxx-4.8.a || true
          [ -f libdb.a ]     && ln -sf libdb.a     libdb-4.8.a     || true

      - name: Configure & Build interchainedd (x86_64)
        script: |
          source "$HOME/.cargo/env"
          J=$(sysctl -n hw.logicalcpu || echo 4)
          ./autogen.sh
          export CPATH="$CM_BUILD_DIR/db4/include:${CPATH:-}"
          export CPPFLAGS="-I$CM_BUILD_DIR/db4/include"
          export CFLAGS="-O2 -arch x86_64"
          export CXXFLAGS="-O2 -std=c++14 -arch x86_64"
          export LDFLAGS="-L$CM_BUILD_DIR/db4/lib -arch x86_64"
          export BDB_LIBS="$CM_BUILD_DIR/db4/lib/libdb_cxx-4.8.a $CM_BUILD_DIR/db4/lib/libdb-4.8.a -pthread"

          ./configure \
            --enable-wallet --with-incompatible-bdb --without-gui \
            --disable-bench --disable-tests --with-zmq --with-miniupnpc \
            --host=x86_64-apple-darwin \
            || { cat config.log; exit 1; }

          NEDB_LIB="$(pwd)/nedb-ffi/target/x86_64-apple-darwin/release/libnedb_ffi.a"
          echo "LIBS += -Wl,-force_load,${NEDB_LIB} -lpthread" >> src/Makefile

          make -j"$J"
          test -f src/interchainedd && test -f src/interchained-cli
          file src/interchainedd

      - name: Package
        script: |
          mkdir -p "$ARTIFACT_DIR"
          cp src/interchainedd src/interchained-cli "$ARTIFACT_DIR"/
          strip "$ARTIFACT_DIR/interchainedd" || true
          strip "$ARTIFACT_DIR/interchained-cli" || true
          [ -f README.md ] && cp README.md "$ARTIFACT_DIR"/ || true
          shasum -a 256 "$ARTIFACT_DIR"/* > "$ARTIFACT_DIR/SHA256SUMS"
          PKG="interchained-macos-x86_64-${CM_TAG:-${CM_COMMIT:0:8}}.tar.gz"
          tar -C "$ARTIFACT_DIR" -czf "$PKG" .
          echo "PKG=$PKG" >> "$CM_ENV"
          echo "Binary for iMac Intel: $(du -sh $ARTIFACT_DIR/interchainedd)"

    artifacts:
      - interchained-macos-x86_64-*.tar.gz
      - nedb-ffi/target/x86_64-apple-darwin/release/libnedb_ffi.a
